name: Linting

on:
  push:
    branches:
      - master
      - development
  pull_request:

jobs:
  lint-test:
    name: Lint & Test
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.1

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3.1

      - name: Install dependencies
        run: uv sync

      - name: Run prek on all files
        run: |
          uv run prek run --all-files --show-diff-on-failure --color=always
        env:
          SKIP: ${{ matrix.python-version == '3.9' && 'pyproject-fmt' || '' }}

      - name: Test with pytest
        run: |
          uv run pytest -v

  docker:
    needs: lint-test
    if: github.event_name != 'pull_request' && github.repository == 'nlef/moonraker-telegram-bot'
    runs-on: ubuntu-24.04
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: lefskiy/moonraker-telegram-bot
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      -
        name: Docker meta
        id: meta_mjpeg
        uses: docker/metadata-action@v5.10.0
        with:
          images: lefskiy/moonraker-telegram-bot
          flavor: |
            prefix=mjpeg-,onlatest=true
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-mjpeg-
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6.18.0
        with:
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
      -
        name: Build and push mjpeg
        uses: docker/build-push-action@v6.18.0
        with:
          file: Dockerfile-mjpeg
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_mjpeg.outputs.tags }}
          labels: ${{ steps.meta_mjpeg.outputs.labels }}
          platforms: linux/amd64,linux/arm64
